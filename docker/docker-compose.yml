version: '3.9'
services:
  artemis:
    image: ghcr.io/zpecoin/artemis:main
    # Uncomment the following lines to build from source instead
    # build: 
    #   context: ..
    #   dockerfile: Dockerfile
    container_name: artemis-bot
    env_file: ../.env
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    command: >
      /usr/local/bin/artemis
      --wss "${WSS}"
      --opensea-api-key "${OPENSEA_API_KEY}"
      --private-key "${PRIVATE_KEY}"
      --arb-contract-address "${ARB_CONTRACT_ADDRESS}"
      --bid-percentage "${BID_PERCENTAGE}"
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - artemis-network

  prometheus:
    image: prom/prometheus:latest
    container_name: artemis-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:9090'
    restart: unless-stopped
    networks:
      - artemis-network

  grafana:
    image: grafana/grafana:latest
    container_name: artemis-grafana
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=artemis
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - artemis-network

volumes:
  prometheus_data:
  grafana_data:

networks:
  artemis-network:
    driver: bridge